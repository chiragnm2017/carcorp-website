name: "Weekly Checks: Metadata & Links"

on:
  schedule:
    - cron: '0 20 * * 0'   # Sunday 6am AEST
  workflow_dispatch:

jobs:
  weekly-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run weekly checks
        id: checks
        run: |
          ISSUES=0
          FINDINGS=""

          # ── Meta description on all pages ────────────────────────────────
          for f in $(find . -name "*.html" -not -path "./.git/*" -not -name "404.html"); do
            if ! grep -q 'name="description"' "$f"; then
              ISSUES=$((ISSUES+1))
              FINDINGS="${FINDINGS}\n### Missing meta description: $f\n"
            fi
          done

          # ── OG tags on key pages ─────────────────────────────────────────
          for f in index.html about.html contact.html; do
            if [ -f "$f" ]; then
              if ! grep -q 'og:title' "$f"; then
                ISSUES=$((ISSUES+1))
                FINDINGS="${FINDINGS}\n### Missing og:title in $f\n"
              fi
            fi
          done

          # ── Hardcoded previous year ───────────────────────────────────────
          PREV_YEAR=$(date -d "last year" +%Y 2>/dev/null || date -v-1y +%Y)
          OLD_YEAR_FILES=$(grep -rl "$PREV_YEAR" --include="*.html" . | grep -v ".git")
          if [ -n "$OLD_YEAR_FILES" ]; then
            ISSUES=$((ISSUES+1))
            FINDINGS="${FINDINGS}\n### Hardcoded year $PREV_YEAR found in:\n$OLD_YEAR_FILES\n"
          fi

          # ── JSON files are valid ─────────────────────────────────────────
          for jf in $(find . -name "*.json" -not -path "./.git/*" -not -path "./.github/*"); do
            if ! python3 -c "import json,sys; json.load(open('$jf'))" 2>/dev/null; then
              ISSUES=$((ISSUES+1))
              FINDINGS="${FINDINGS}\n### Invalid JSON: $jf\n"
            fi
          done

          # ── sitemap.xml and robots.txt present ──────────────────────────
          [ ! -f "sitemap.xml" ] && { ISSUES=$((ISSUES+1)); FINDINGS="${FINDINGS}\n### sitemap.xml missing\n"; }
          [ ! -f "robots.txt" ]  && { ISSUES=$((ISSUES+1)); FINDINGS="${FINDINGS}\n### robots.txt missing\n"; }
          [ ! -f "llms.txt" ]    && { ISSUES=$((ISSUES+1)); FINDINGS="${FINDINGS}\n### llms.txt missing\n"; }

          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          printf "%b" "$FINDINGS" > /tmp/weekly-findings.txt

          if [ $ISSUES -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: All clear
        if: steps.checks.outputs.has_issues == 'false'
        run: echo "Weekly Checks — All clear."

      - name: Create GitHub issue
        if: steps.checks.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync('/tmp/weekly-findings.txt', 'utf8');
            const count = '${{ steps.checks.outputs.issues }}';
            const date  = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly Checks] ${count} issue(s) — ${date}`,
              body: `## Weekly Check Report — ${date}\n\n**${count} issue(s) found.**\n\n---\n\n${findings}\n\n---\n*Generated by Weekly Checks workflow.*`,
              labels: ['automated-check']
            });
