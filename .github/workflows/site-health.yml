name: "Site Health: Weekly Check"

on:
  schedule:
    - cron: '0 20 * * 0'   # Sunday 6am AEST
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HTML structure checks
        id: health
        run: |
          ISSUES=0
          FINDINGS=""

          # ── Mobile viewport tag on all HTML pages ─────────────────────────
          for f in $(find . -name "*.html" -not -path "./.git/*"); do
            if ! grep -q 'name="viewport"' "$f"; then
              ISSUES=$((ISSUES+1))
              FINDINGS="${FINDINGS}\n### Missing viewport meta tag: $f\n"
            fi
          done

          # ── All HTML pages have <title> ───────────────────────────────────
          for f in $(find . -name "*.html" -not -path "./.git/*"); do
            if ! grep -q '<title>' "$f"; then
              ISSUES=$((ISSUES+1))
              FINDINGS="${FINDINGS}\n### Missing <title> tag: $f\n"
            fi
          done

          # ── Images have alt attributes ────────────────────────────────────
          IMG_NO_ALT=$(grep -rn '<img' --include="*.html" . | grep -v 'alt=' | wc -l)
          if [ "$IMG_NO_ALT" -gt 0 ]; then
            ISSUES=$((ISSUES+1))
            FINDINGS="${FINDINGS}\n### $IMG_NO_ALT image(s) missing alt attribute\n"
          fi

          # ── Internal links resolve ────────────────────────────────────────
          for f in $(find . -name "*.html" -not -path "./.git/*"); do
            LINKS=$(grep -o 'href="[^"]*\.html[^"]*"' "$f" | grep -v "http" | sed 's/href="//;s/"//' | sed 's/#.*//' | head -20)
            for link in $LINKS; do
              link_path=$(echo "$link" | sed 's|^/||')
              if [ -n "$link_path" ] && [ ! -f "$link_path" ]; then
                ISSUES=$((ISSUES+1))
                FINDINGS="${FINDINGS}\n### Broken internal link: $link in $f\n"
              fi
            done
          done

          # ── data/careers.json is valid JSON ──────────────────────────────
          if [ -f "data/careers.json" ]; then
            if ! python3 -c "import json,sys; json.load(open('data/careers.json'))" 2>/dev/null; then
              ISSUES=$((ISSUES+1))
              FINDINGS="${FINDINGS}\n### data/careers.json is invalid JSON\n"
            fi
          fi

          # ── No placeholder {{TOKENS}} left in HTML ───────────────────────
          TOKEN_COUNT=$(grep -rn "{{" --include="*.html" . | grep -v "<!--\|gtm.js" | wc -l)
          if [ "$TOKEN_COUNT" -gt 0 ]; then
            ISSUES=$((ISSUES+1))
            FINDINGS="${FINDINGS}\n### $TOKEN_COUNT unreplaced {{TOKEN}} placeholder(s) found in HTML\n\`\`\`\n$(grep -rn "{{" --include="*.html" . | grep -v "<!--\|gtm.js" | head -10)\n\`\`\`\n"
          fi

          # ── Footer copyright year is current ─────────────────────────────
          CURRENT_YEAR=$(date +%Y)
          if grep -rn "footer-year" --include="*.html" . | grep -q "textContent"; then
            : # Dynamic year — OK
          fi

          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          printf "%b" "$FINDINGS" > /tmp/health-findings.txt

          if [ $ISSUES -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: All clear
        if: steps.health.outputs.has_issues == 'false'
        run: echo "Site Health — All checks passed."

      - name: Create GitHub issue for findings
        if: steps.health.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync('/tmp/health-findings.txt', 'utf8');
            const count = '${{ steps.health.outputs.issues }}';
            const date  = new Date().toISOString().split('T')[0];

            const body = `## Site Health Report — ${date}

            **${count} issue(s) found.**

            ---

            ${findings}

            ---
            *Generated by Site Health workflow.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Site Health] ${count} issue(s) found — ${date}`,
              body: body,
              labels: ['site-health']
            });
