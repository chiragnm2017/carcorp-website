name: "Security Guardian: Daily Scan"

on:
  schedule:
    - cron: '0 20 * * *'   # 6am AEST daily (UTC+10). Change to '0 19 * * *' during AEDT (Oct–Apr)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security scan
        id: scan
        run: |
          CRITICAL=0
          HIGH=0
          MEDIUM=0
          LOW=0
          FINDINGS=""

          # ── CRITICAL: Hardcoded secrets ──────────────────────────────────
          SECRET_PATTERNS="password\s*=\s*['\"][^'\"]{6,}|api[_-]?key\s*=\s*['\"][^'\"]{8,}|secret\s*=\s*['\"][^'\"]{8,}|private[_-]?key|BEGIN RSA|BEGIN OPENSSH"
          if grep -rEi "$SECRET_PATTERNS" --include="*.html" --include="*.js" --include="*.css" . 2>/dev/null | grep -v "{{" | grep -v "YOUR_" | grep -q .; then
            CRITICAL=$((CRITICAL+1))
            FINDINGS="${FINDINGS}\n### CRITICAL: Possible hardcoded secret detected\nCheck output of: \`grep -rEi 'password|api_key|secret' --include='*.html' --include='*.js' .\`\n"
          fi

          # ── CRITICAL: Unsafe JavaScript patterns ─────────────────────────
          if grep -rn "eval(" --include="*.js" . | grep -v "//" | grep -v "{{" | grep -q .; then
            CRITICAL=$((CRITICAL+1))
            FINDINGS="${FINDINGS}\n### CRITICAL: eval() usage found in JS\n\`\`\`\n$(grep -rn "eval(" --include="*.js" . | grep -v "//")\n\`\`\`\n"
          fi
          if grep -rn "document.write(" --include="*.js" --include="*.html" . | grep -q .; then
            CRITICAL=$((CRITICAL+1))
            FINDINGS="${FINDINGS}\n### CRITICAL: document.write() found\n\`\`\`\n$(grep -rn "document.write(" --include="*.js" --include="*.html" .)\n\`\`\`\n"
          fi

          # ── HIGH: Inline event handlers ──────────────────────────────────
          INLINE_EVENTS=$(grep -rn "on(click|error|load|submit|change)=" --include="*.html" . 2>/dev/null | grep -v "{{" | wc -l)
          if [ "$INLINE_EVENTS" -gt 0 ]; then
            HIGH=$((HIGH+1))
            FINDINGS="${FINDINGS}\n### HIGH: $INLINE_EVENTS inline event handler(s) found\nConsider moving to JS event listeners.\n"
          fi

          # ── HIGH: Mixed content ──────────────────────────────────────────
          if grep -rn 'src="http://' --include="*.html" . | grep -q .; then
            HIGH=$((HIGH+1))
            FINDINGS="${FINDINGS}\n### HIGH: Mixed content (http:// src) found\n\`\`\`\n$(grep -rn 'src="http://' --include="*.html" .)\n\`\`\`\n"
          fi

          # ── MEDIUM: Missing meta tags ─────────────────────────────────────
          for f in $(find . -name "*.html" -not -path "./.git/*" -not -name "404.html"); do
            if ! grep -q '<meta name="description"' "$f"; then
              MEDIUM=$((MEDIUM+1))
              FINDINGS="${FINDINGS}\n### MEDIUM: Missing meta description in $f\n"
            fi
            if ! grep -q '<html lang=' "$f"; then
              MEDIUM=$((MEDIUM+1))
              FINDINGS="${FINDINGS}\n### MEDIUM: Missing html lang attribute in $f\n"
            fi
          done

          # ── LOW: Hardcoded years ─────────────────────────────────────────
          PREV_YEAR=$(date -d "last year" +%Y 2>/dev/null || date -v-1y +%Y)
          if grep -rn "$PREV_YEAR" --include="*.html" . | grep -v "footer-year\|<!--\|// " | grep -q .; then
            LOW=$((LOW+1))
            FINDINGS="${FINDINGS}\n### LOW: Hardcoded year $PREV_YEAR found (should use dynamic JS)\n"
          fi

          # ── LOW: TODO/FIXME comments ─────────────────────────────────────
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.html" --include="*.js" --include="*.css" . | wc -l)
          if [ "$TODO_COUNT" -gt 0 ]; then
            LOW=$((LOW+1))
            FINDINGS="${FINDINGS}\n### LOW: $TODO_COUNT TODO/FIXME comment(s) remaining\n"
          fi

          # ── CRITICAL: Webhook URL exposed in public client-side JS ─────────
          if grep -rn "hooks\.zapier\.com\|hooks\.make\.com\|webhook\.site\|discord\.com/api/webhooks" \
               --include="*.js" --include="*.html" . 2>/dev/null \
             | grep -v "worker/" | grep -q .; then
            CRITICAL=$((CRITICAL+1))
            FINDINGS="${FINDINGS}\n### CRITICAL: Webhook URL exposed in public client-side code\nThe Zapier/Make webhook URL must only exist as a Worker secret — never in JS or HTML.\n\`\`\`\n$(grep -rn "hooks\.zapier\.com\|hooks\.make\.com" --include="*.js" --include="*.html" . | grep -v "worker/" | head -5)\n\`\`\`\n"
          fi

          # ── CRITICAL: Form posting directly to external webhook ───────────
          if grep -rn "fetch.*hooks\.\|fetch.*webhook" --include="*.js" . 2>/dev/null \
             | grep -v "worker/" | grep -q .; then
            CRITICAL=$((CRITICAL+1))
            FINDINGS="${FINDINGS}\n### CRITICAL: Direct webhook fetch in client-side JS\nAll form submissions must route through the /api/contact Worker proxy, not directly to Zapier.\n\`\`\`\n$(grep -rn "fetch.*hooks\." --include="*.js" . | grep -v "worker/" | head -5)\n\`\`\`\n"
          fi

          # ── HIGH: form.js missing Turnstile token check ───────────────────
          if [ -f "js/form.js" ]; then
            if ! grep -q "cf-turnstile-response" "js/form.js"; then
              HIGH=$((HIGH+1))
              FINDINGS="${FINDINGS}\n### HIGH: form.js does not verify Turnstile token — CAPTCHA is bypassable\nAdd check for [name=\"cf-turnstile-response\"] before submission.\n"
            fi
          fi

          # ── HIGH: form.js not routing through Worker proxy ────────────────
          if [ -f "js/form.js" ]; then
            if ! grep -q "/api/contact" "js/form.js"; then
              HIGH=$((HIGH+1))
              FINDINGS="${FINDINGS}\n### HIGH: form.js is not routing through /api/contact Worker proxy\nDirect webhook posting exposes the Zapier URL and bypasses server-side validation.\n"
            fi
          fi

          # ── HIGH: no-cors fetch mode in public JS ─────────────────────────
          if grep -rn "no-cors" --include="*.js" . 2>/dev/null | grep -v "worker/" | grep -q .; then
            HIGH=$((HIGH+1))
            FINDINGS="${FINDINGS}\n### HIGH: no-cors fetch mode in client-side JS — responses cannot be verified\nUse a Worker proxy instead so real HTTP status codes are readable.\n\`\`\`\n$(grep -rn "no-cors" --include="*.js" . | grep -v "worker/" | head -5)\n\`\`\`\n"
          fi

          # ── HIGH: External scripts missing SRI integrity attribute ─────────
          SRI_MISSING=$(grep -rn '<script src="https://' --include="*.html" . | grep -v 'integrity=' | wc -l)
          if [ "$SRI_MISSING" -gt 0 ]; then
            HIGH=$((HIGH+1))
            FINDINGS="${FINDINGS}\n### HIGH: $SRI_MISSING external <script> tag(s) loaded without SRI integrity attribute\nA compromised CDN can inject malicious code. Add integrity= and crossorigin= attributes.\n"
          fi

          # ── MEDIUM: novalidate form without JS validation ─────────────────
          NOVALIDATE_COUNT=$(grep -rn "novalidate" --include="*.html" . | wc -l)
          JS_VALIDATION=$(grep -rn "querySelectorAll.*required\|checkValidity\|reportValidity" --include="*.js" . | wc -l)
          if [ "$NOVALIDATE_COUNT" -gt 0 ] && [ "$JS_VALIDATION" -eq 0 ]; then
            MEDIUM=$((MEDIUM+1))
            FINDINGS="${FINDINGS}\n### MEDIUM: Form uses novalidate but no JS validation found\nnovalidate disables browser validation — JS validation must compensate.\n"
          fi

          # ── robots.txt and sitemap present ───────────────────────────────
          [ ! -f "robots.txt" ]  && { MEDIUM=$((MEDIUM+1)); FINDINGS="${FINDINGS}\n### MEDIUM: robots.txt missing\n"; }
          [ ! -f "sitemap.xml" ] && { MEDIUM=$((MEDIUM+1)); FINDINGS="${FINDINGS}\n### MEDIUM: sitemap.xml missing\n"; }
          [ ! -f "llms.txt" ]    && { LOW=$((LOW+1));    FINDINGS="${FINDINGS}\n### LOW: llms.txt missing\n"; }

          TOTAL=$((CRITICAL+HIGH+MEDIUM+LOW))

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"     >> $GITHUB_OUTPUT
          echo "low=$LOW"           >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT

          # Write findings to file for next step
          printf "%b" "$FINDINGS" > /tmp/findings.txt

          if [ $TOTAL -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: All clear
        if: steps.scan.outputs.has_issues == 'false'
        run: echo "Security Guardian — All clear. Checks passed."

      - name: Create GitHub issue for findings
        if: steps.scan.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync('/tmp/findings.txt', 'utf8');
            const critical = '${{ steps.scan.outputs.critical }}';
            const high     = '${{ steps.scan.outputs.high }}';
            const medium   = '${{ steps.scan.outputs.medium }}';
            const low      = '${{ steps.scan.outputs.low }}';
            const total    = '${{ steps.scan.outputs.total }}';
            const date     = new Date().toISOString().split('T')[0];

            const body = `## Security Guardian Report — ${date}

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${critical} |
            | 🟠 High | ${high} |
            | 🟡 Medium | ${medium} |
            | 🟢 Low | ${low} |
            | **Total** | **${total}** |

            ---

            ${findings}

            ---
            *Generated by Security Guardian workflow. Review and resolve before next deploy.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security Guardian] ${total} finding(s) — ${date}`,
              body: body,
              labels: ['security-guardian']
            });
